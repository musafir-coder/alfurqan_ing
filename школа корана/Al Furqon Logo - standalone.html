  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ay:grid;place-items:center;\n    background:#0e0c08;\n  }\n  .stage{\n    position:relative;\n    width:1280px;height:800px;\n    transform-origin:center center;\n    background:\n      radial-gradient(120% 90% at 50% 35%, #f4eedd 0%, #ece5cf 45%, #d9cead 100%);\n    overflow:hidden;\n    box-shadow:0 40px 120px rgba(0,0,0,.35);\n  }\n  /* Paper grain */\n  .stage::before{\n    content:\"\";position:absolute;inset:0;pointer-events:none;\n    background-image:\n      radial-gradient(rgba(120,90,40,.05) 1px, transparent 1.4px),\n      radial-gradient(rgba(80,60,20,.04) 1px, transparent 1.6px);\n    background-size: 6px 6px, 11px 11px;\n    background-position: 0 0, 3px 3px;\n    mix-blend-mode:multiply;\n    opacity:.65;\n  }\n  .stage::after{\n    content:\"\";position:absolute;inset:0;pointer-events:none;\n    background:\n      radial-gradient(80% 60% at 50% 30%, transparent 50%, rgba(80,55,15,.18) 100%);\n  }\n\n  /* ====== Logo composition ====== */\n  .composer{\n    position:absolute;left:50%;top:42%;\n    transform:translate(-50%,-50%);\n    width:520px;height:520px;\n  }\n  .badge{\n    position:absolute;inset:0;\n    display:grid;place-items:center;\n  }\n\n  /* The actual logo image — wrapped so we can compose clip-path + transform */\n  .badge .logo-clip{\n    width:460px;height:460px;\n    display:grid;place-items:center;\n    clip-path: circle(0% at 50% 42%);\n    animation: revealLogo 2000ms cubic-bezier(.22,.61,.36,1) 700ms forwards;\n  }\n  .badge .logo-inner{\n    width:100%;height:100%;\n    transform:scale(.55) rotate(-90deg);\n    opacity:0;\n    animation: spinSettle 2200ms cubic-bezier(.16,.84,.32,1) 500ms forwards;\n    display:grid;place-items:center;\n  }\n  .logo-img{\n    width:460px;height:460px;\n    /* The source PNG has baked-in title text in the lower half and a cream\n       background — we strip the cream to transparent in a canvas at load,\n       then set the resulting data URL as the background here. */\n    background-image:none;\n    background-repeat:no-repeat;\n    background-size:840px 840px;\n    background-position:center -65px;\n    display:block;\n  }\n  @keyframes revealLogo{\n    0%   { clip-path: circle(0% at 50% 42%); }\n    100% { clip-path: circle(72% at 50% 42%); }\n  }\n  @keyframes spinSettle{\n    0%   { transform: scale(.55) rotate(-90deg); opacity:0; }\n    25%  { opacity:1;}\n    100% { transform: scale(1.05) rotate(0deg); opacity:1;}\n  }\n\n  /* The diamond stroke frame that draws around */\n  .frame{\n    position:absolute;left:50%;top:50%;\n    transform:translate(-50%,-50%) rotate(45deg);\n    width:330px;height:330px;\n    pointer-events:none;\n  }\n  .frame svg{width:100%;height:100%;overflow:visible}\n  .frame rect.outline{\n    fill:none;\n    stroke:var(--green-1);\n    stroke-width:2;\n    stroke-dasharray:1320;\n    stroke-dashoffset:1320;\n    opacity:.0;\n    animation:drawFrame 1400ms cubic-bezier(.55,.06,.22,.95) 350ms forwards;\n  }\n  @keyframes drawFrame{\n    0%   {stroke-dashoffset:1320; opacity:.0;}\n    10%  {opacity:.8;}\n    100% {stroke-dashoffset:0; opacity:.0;}\n  }\n\n  /* Inner accent — golden frame that lingers under the logo */\n  .frame rect.gold{\n    fill:none;\n    stroke:var(--gold);\n    stroke-width:1.5;\n    opacity:0;\n    transform-origin:center;\n    transform:scale(.6);\n    animation:goldIn 900ms ease-out 2000ms forwards;\n  }\n  @keyframes goldIn{\n    0%   {opacity:0; transform:scale(.6);}\n    60%  {opacity:.55;}\n    100% {opacity:.35; transform:scale(1);}\n  }\n\n  /* Center spark */\n  .spark{\n    position:absolute;left:50%;top:42%;\n    width:6px;height:6px;border-radius:50%;\n    background:var(--green-2);\n    transform:translate(-50%,-50%) scale(0);\n    box-shadow:0 0 0 0 rgba(44,143,115,.7);\n    animation:sparkBurst 900ms ease-out 100ms both;\n  }\n  @keyframes sparkBurst{\n    0%   {transform:translate(-50%,-50%) scale(0); opacity:0;}\n    30%  {transform:translate(-50%,-50%) scale(1.4); opacity:1; box-shadow:0 0 28px 8px rgba(74,179,147,.55);}\n    100% {transform:translate(-50%,-50%) scale(4); opacity:0; box-shadow:0 0 0 28px rgba(74,179,147,0);}\n  }\n\n  /* Golden shimmer sweep across logo */\n  .shimmer{\n    position:absolute;left:50%;top:50%;\n    width:560px;height:560px;\n    transform:translate(-50%,-50%) rotate(45deg);\n    overflow:hidden;\n    pointer-events:none;\n    opacity:0;\n    animation:shimmerShow 1400ms ease-out 2400ms both;\n    -webkit-mask: radial-gradient(circle at center, #000 0 45%, transparent 65%);\n            mask: radial-gradient(circle at center, #000 0 45%, transparent 65%);\n  }\n  .shimmer::before{\n    content:\"\";position:absolute;top:0;bottom:0;left:-30%;width:30%;\n    background:linear-gradient(90deg,\n      transparent 0%,\n      rgba(255,235,180,.0) 20%,\n      rgba(255,235,180,.85) 50%,\n      rgba(255,235,180,0) 80%,\n      transparent 100%);\n    filter:blur(2px);\n    animation:shimmerSweep 1200ms ease-in-out 2500ms both;\n  }\n  @keyframes shimmerShow{\n    0%,100%{opacity:1}\n  }\n  @keyframes shimmerSweep{\n    0%   { left:-30%; }\n    100% { left:130%; }\n  }\n\n  /* Soft halo behind logo — also doubles as a soft drop-shadow now that\n     the PNG is blend-darkened (drop-shadow would outline its rectangle). */\n  .halo{\n    position:absolute;left:50%;top:42%;\n    width:580px;height:580px;\n    transform:translate(-50%,-50%) scale(.4);\n    border-radius:50%;\n    background:\n      radial-gradient(circle, rgba(15,90,75,.16) 0%, rgba(15,90,75,.06) 28%, transparent 60%);\n    opacity:0;\n    animation:haloIn 1800ms ease-out 800ms forwards;\n    pointer-events:none;\n    filter: blur(2px);\n  }\n  @keyframes haloIn{\n    0%   {opacity:0; transform:translate(-50%,-50%) scale(.4);}\n    60%  {opacity:1;}\n    100% {opacity:.7; transform:translate(-50%,-50%) scale(1);}\n  }\n\n  /* ====== Title ====== */\n  .title-wrap{\n    position:absolute;left:0;right:0;bottom:170px;\n    text-align:center;\n    perspective:800px;\n  }\n  .title{\n    font-family:'Cinzel', serif;\n    font-weight:500;\n    font-size:78px;\n    letter-spacing:.16em;\n    color:var(--ink);\n    display:inline-flex;\n    gap:.04em;\n  }\n  .title .ch{\n    display:inline-block;\n    opacity:0;\n    transform:translateY(28px) rotateX(-60deg);\n    transform-origin:50% 100%;\n    animation:letterIn 700ms cubic-bezier(.2,.7,.2,1) forwards;\n  }\n  .title .ch.space{width:.45em;}\n  @keyframes letterIn{\n    0%   {opacity:0; transform:translateY(28px) rotateX(-60deg);}\n    60%  {opacity:1;}\n    100% {opacity:1; transform:translateY(0) rotateX(0);}\n  }\n\n  /* divider line under title */\n  .divider{\n    position:absolute;left:50%;bottom:148px;\n    width:0;height:1px;\n    background:linear-gradient(90deg, transparent, var(--gold) 20%, var(--gold) 80%, transparent);\n    transform:translateX(-50%);\n    opacity:0;\n    animation:dividerGrow 900ms ease-out 3100ms forwards;\n  }\n  @keyframes dividerGrow{\n    0%   {width:0;opacity:0;}\n    100% {width:340px;opacity:.85;}\n  }\n\n  /* subtitle */\n  .subtitle{\n    position:absolute;left:0;right:0;bottom:96px;\n    text-align:center;\n    font-family:'Montserrat',sans-serif;\n    font-weight:400;\n    font-size:22px;\n    letter-spacing:.42em;\n    color:var(--ink-soft);\n    text-transform:uppercase;\n    opacity:0;\n    transform:translateY(12px);\n    animation:fadeUp 900ms ease-out 3400ms forwards;\n    padding-left:.42em; /* visually compensate letter-spacing */\n  }\n  @keyframes fadeUp{\n    0%   {opacity:0; transform:translateY(12px);}\n    100% {opacity:.85; transform:translateY(0);}\n  }\n\n  /* small arabic marker */\n  .marker{\n    position:absolute;left:50%;bottom:50px;\n    transform:translateX(-50%);\n    font-family:'Cormorant Garamond', serif;\n    font-style:italic;\n    font-weight:300;\n    font-size:14px;\n    letter-spacing:.5em;\n    color:rgba(29,42,69,.5);\n    opacity:0;\n    animation:fadeUp 900ms ease-out 3900ms forwards;\n    padding-left:.5em;\n  }\n\n  /* Replay control */\n  .controls{\n    position:fixed;top:18px;right:18px;\n    display:flex;gap:10px;z-index:30;\n  }\n  .btn{\n    appearance:none;border:none;cursor:pointer;\n    background:rgba(255,255,255,.06);\n    color:#efe9d9;\n    border:1px solid rgba(239,233,217,.18);\n    backdrop-filter: blur(6px);\n    -webkit-backdrop-filter: blur(6px);\n    padding:9px 14px;border-radius:999px;\n    font: 500 12px/1 'Montserrat',sans-serif;\n    letter-spacing:.18em;text-transform:uppercase;\n    transition:.2s ease;\n  }\n  .btn:hover{background:rgba(255,255,255,.12);}\n  .btn:active{transform:translateY(1px);}\n\n  /* When replay class is applied, restart animations by toggling key */\n  .stage[data-play=\"0\"] *{animation:none !important}\n  .stage[data-play=\"0\"] .logo-clip{clip-path:circle(0% at 50% 42%)}\n  .stage[data-play=\"0\"] .logo-inner{opacity:0;transform:scale(.55) rotate(-90deg)}\n  .stage[data-play=\"0\"] .title .ch{opacity:0; transform:translateY(28px) rotateX(-60deg)}\n  .stage[data-play=\"0\"] .subtitle{opacity:0}\n  .stage[data-play=\"0\"] .marker{opacity:0}\n  .stage[data-play=\"0\"] .divider{width:0;opacity:0}\n  .stage[data-play=\"0\"] .halo{opacity:0; transform:translate(-50%,-50%) scale(.4)}\n  .stage[data-play=\"0\"] .frame rect.outline{stroke-dashoffset:1320;opacity:0}\n  .stage[data-play=\"0\"] .frame rect.gold{opacity:0;transform:scale(.6)}\n\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<div class=\"viewport\" id=\"viewport\">\n  <div class=\"stage\" id=\"stage\">\n\n    <div class=\"composer\">\n      <div class=\"halo\"><\u002Fdiv>\n\n      <!-- Diamond stroke frame that draws around -->\n      <div class=\"frame\">\n        <svg viewBox=\"0 0 100 100\">\n          <rect class=\"outline\" x=\"2\" y=\"2\" width=\"96\" height=\"96\" rx=\"1.5\"><\u002Frect>\n          <rect class=\"gold\" x=\"6\" y=\"6\" width=\"88\" height=\"88\" rx=\"1\"><\u002Frect>\n        <\u002Fsvg>\n      <\u002Fdiv>\n\n      <div class=\"badge\">\n        <div class=\"logo-clip\">\n          <div class=\"logo-inner\">\n            <div class=\"logo-img\" role=\"img\" aria-label=\"Al Furqon\"><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"shimmer\"><\u002Fdiv>\n      <div class=\"spark\"><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"title-wrap\">\n      <div class=\"title\" id=\"title\"><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"divider\"><\u002Fdiv>\n    <div class=\"subtitle\">Школа изучения Корана<\u002Fdiv>\n    <div class=\"marker\">· بسم الله ·<\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<div class=\"controls\">\n  <button class=\"btn\" id=\"replay\">Replay<\u002Fbutton>\n<\u002Fdiv>\n\n<script>\n  // ---------- Strip cream background from the source PNG ----------\n  // The source has solid cream behind the green calligraphy. We sample the\n  // top-left pixel as the \"background\" color and zero out alpha for any\n  // pixel close to it, with a soft falloff at the edges so the metallic\n  // green stays crisp.\n  async function prepareLogo(){\n    const img = new Image();\n    img.crossOrigin = 'anonymous';\n    await new Promise((res, rej)=>{\n      img.onload = res;\n      img.onerror = rej;\n      img.src = 'assets/logo.png';\n    });\n    const w = img.naturalWidth, h = img.naturalHeight;\n    const cv = document.createElement('canvas');\n    cv.width = w; cv.height = h;\n    const ctx = cv.getContext('2d');\n    ctx.drawImage(img, 0, 0);\n    const id = ctx.getImageData(0, 0, w, h);\n    const px = id.data;\n    // Sample a few corner pixels and average\n    function sample(x,y){\n      const k = (y*w + x)*4;\n      return [px[k], px[k+1], px[k+2]];\n    }\n    const s = [\n      sample(2,2), sample(w-3,2), sample(2,h-3), sample(w-3,h-3),\n      sample(8,8), sample(w-9,8)\n    ];\n    const sr = s.reduce((a,p)=>a+p[0],0)/s.length;\n    const sg = s.reduce((a,p)=>a+p[1],0)/s.length;\n    const sb = s.reduce((a,p)=>a+p[2],0)/s.length;\n    const NEAR = 55;   // distance below this → fully transparent\n    const FAR  = 95;   // distance above this → fully opaque\n    for(let i=0;i<px.length;i+=4){\n      const r = px[i], g = px[i+1], b = px[i+2];\n      const dr = r - sr, dg = g - sg, db = b - sb;\n      const dist = Math.sqrt(dr*dr + dg*dg + db*db);\n      // greenness — protect strongly-green pixels (calligraphy) from being keyed out\n      const greenness = g - (r + b)/2;\n      if (greenness > 18){\n        // definitely the ink — leave fully opaque\n        continue;\n      }\n      if (dist < NEAR){\n        px[i+3] = 0;\n      } else if (dist < FAR){\n        const t = (dist - NEAR) / (FAR - NEAR);\n        px[i+3] = Math.round(px[i+3] * t);\n      }\n    }\n    ctx.putImageData(id, 0, 0);\n    const url = cv.toDataURL('image/png');\n    document.querySelectorAll('.logo-img').forEach(el=>{\n      el.style.backgroundImage = `url(${url})`;\n    });\n  }\n  prepareLogo().catch(err => {\n    console.warn('logo prep fell back to raw PNG:', err);\n    document.querySelectorAll('.logo-img').forEach(el=>{\n      el.style.backgroundImage = 'url(assets/logo.png)';\n      el.style.mixBlendMode = 'darken';\n    });\n  });\n  // Build title letters with stagger\n  const titleText = \"AL FURQON\";\n  const titleEl = document.getElementById('title');\n  function buildTitle(){\n    titleEl.innerHTML = \"\";\n    [...titleText].forEach((c,i)=>{\n      const span = document.createElement('span');\n      span.className = 'ch' + (c===' '?' space':'');\n      span.textContent = c===' '?'\\u00a0':c;\n      span.style.animationDelay = (2400 + i*70) + 'ms';\n      titleEl.appendChild(span);\n    });\n  }\n  buildTitle();\n\n  // Scale stage to viewport\n  const vp = document.getElementById('viewport');\n  const stage = document.getElementById('stage');\n  function fit(){\n    const sw = 1280, sh = 800;\n    const r = Math.min(window.innerWidth/sw, window.innerHeight/sh);\n    stage.style.transform = `scale(${r})`;\n  }\n  fit();\n  window.addEventListener('resize', fit);\n\n  // Replay logic — toggle play state to restart CSS animations\n  document.getElementById('replay').addEventListener('click', ()=>{\n    stage.setAttribute('data-play','0');\n    // force reflow then resume\n    void stage.offsetWidth;\n    // rebuild title (so animation delay resets)\n    buildTitle();\n    requestAnimationFrame(()=>{\n      stage.removeAttribute('data-play');\n    });\n  });\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
